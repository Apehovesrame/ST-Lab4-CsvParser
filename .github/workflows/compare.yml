name: Comparative Test Report

on:
  workflow_dispatch: # 횘챤챘체챗챤 챨처첨챠챤챕 챌횪챦처챰챗 채챘첼 챰챨횪창챠책챠챔첼

jobs:
  test-ai-v1-deepseek:
    name: Test AI Version 1 (DeepSeek)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
      with:
        ref: ai-version-1 
    - uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
    - run: nuget restore STlab1.sln
    - run: dotnet build --no-restore
    - run: dotnet test --no-build --verbosity normal

  test-ai-v2-yandex:
    name: Test AI Version 2 (YandexGPT)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
      with:
        ref: ai-version-2 
    - uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
    - run: nuget restore STlab1.sln
    - run: dotnet build --no-restore
    - run: dotnet test --no-build --verbosity normal

  test-ai-v3-gigachat:
    name: Test AI Version 3 (GigaChat)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
      with:
        ref: ai-version-3 
    - uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
    - run: nuget restore STlab1.sln
    - run: dotnet build --no-restore
    - run: dotnet test --no-build --verbosity normal
