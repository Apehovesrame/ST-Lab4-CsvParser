name: .NET CI Pipeline (NUnit)

on:
  push:
    branches: [ "main", "ai-version-1", "ai-version-2", "ai-version-3" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Ðó÷íîé çàïóñê

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.0.305

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
    - name: Restore dependencies
      run: nuget restore STlab1.sln

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal --logger "console; verbosity=detailed"
